<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Feed</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text: #000000;
            --text-sec: #8E8E93;
            --accent: #007AFF;
            --danger: #FF3B30;
            --border: #E5E5EA;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
            --radius: 12px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #1C1C1E;
                --text: #FFFFFF;
                --text-sec: #98989D;
                --border: #38383A;
                --shadow: 0 2px 8px rgba(0,0,0,0.3);
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
            transition: background 0.3s;
            overscroll-behavior-y: contain; /* Prevent pull-to-refresh */
        }

        header {
            padding: 20px 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }

        h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

        .btn-icon {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px;
        }

        #feed-container {
            padding: 10px 16px;
            display: grid;
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            cursor: pointer;
            position: relative;
        }

        .card:active { transform: scale(0.98); }

        .card-img {
            height: 180px;
            width: 100%;
            object-fit: cover;
            background-color: var(--border);
        }

        .card-content { padding: 16px; }

        .card-source {
            font-size: 12px;
            color: var(--text-sec);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            margin: 0 0 8px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            font-size: 13px;
            color: var(--text-sec);
        }

        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            background-color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
            cursor: pointer;
            border: none;
            z-index: 200;
            transition: transform 0.2s;
        }
        .fab:active { transform: scale(0.9); }
        .fab svg { width: 24px; height: 24px; fill: white; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 300;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .modal-overlay.active .modal { transform: translateY(0); }

        .modal h2 { margin-top: 0; }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn-full {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .delete-feed {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
        }

        .loading { text-align: center; color: var(--text-sec); padding: 40px; font-size: 14px; }

        .refresh-btn {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 48px;
            height: 48px;
            background-color: var(--card-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: none;
            z-index: 200;
        }
        .refresh-btn svg { width: 20px; height: 20px; fill: var(--text); }

        /* Splash screen background */
        .splash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .splash.hidden { opacity: 0; pointer-events: none; }
        .splash h1 { font-size: 32px; color: var(--accent); }
    </style>
</head>
<body>

<!-- Splash Screen -->
<div class="splash" id="splash">
    <h1>Feed</h1>
</div>

<header>
    <h1>Feed</h1>
    <button class="btn-icon" onclick="clearAll()">Clear</button>
</header>

<div id="feed-container">
    <div class="loading">Add a feed URL to get started.</div>
</div>

<button class="refresh-btn" onclick="refreshFeeds()" title="Refresh All">
    <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</button>

<button class="fab" onclick="openModal()">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
        <h2>Add New Feed</h2>
        <p style="color:var(--text-sec); font-size: 14px; margin-bottom: 20px;">Paste an RSS or Atom URL.</p>
        <input type="url" id="feedUrl" placeholder="https://example.com/feed.xml">
        <button class="btn-full" onclick="addFeed()">Add Feed</button>
    </div>
</div>

<script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registered'));
    }

    // Hide splash screen on load
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash').classList.add('hidden');
        }, 500);
    });

    let feeds = JSON.parse(localStorage.getItem('myFeeds')) || [];
    const container = document.getElementById('feed-container');
    const ITEMS_PER_FEED = 50;

    renderFeeds();

    function openModal() { document.getElementById('modalOverlay').classList.add('active'); }
    function closeModal(e) {
        if(e.target.id === 'modalOverlay') document.getElementById('modalOverlay').classList.remove('active');
    }

    async function addFeed() {
        const url = document.getElementById('feedUrl').value;
        if (!url) return;

        const btn = document.querySelector('.btn-full');
        btn.innerText = "Loading...";
        btn.disabled = true;

        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
            const data = await response.json();

            if (data.status === 'ok') {
                const feedObj = {
                    id: Date.now(),
                    url: url,
                    title: data.feed.title,
                    items: data.items.slice(0, ITEMS_PER_FEED)
                };

                feeds.push(feedObj);
                saveFeeds();
                renderFeeds();
                document.getElementById('modalOverlay').classList.remove('active');
                document.getElementById('feedUrl').value = '';
            } else {
                alert('Invalid RSS Feed URL');
            }
        } catch (e) {
            alert('Error fetching feed. Make sure it is a valid RSS link.');
        } finally {
            btn.innerText = "Add Feed";
            btn.disabled = false;
        }
    }

    async function refreshFeeds() {
        const btn = document.querySelector('.refresh-btn');
        btn.style.transform = 'rotate(360deg)';
        btn.style.transition = 'transform 0.5s';

        for (let feed of feeds) {
            try {
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                const data = await response.json();
                if (data.status === 'ok') {
                    feed.items = data.items.slice(0, ITEMS_PER_FEED);
                }
            } catch (e) { console.log('Refresh error for', feed.title); }
        }
        saveFeeds();
        renderFeeds();

        setTimeout(() => {
            btn.style.transform = 'rotate(0deg)';
        }, 500);
    }

    function deleteFeed(id) {
        if(confirm("Remove this feed?")) {
            feeds = feeds.filter(f => f.id !== id);
            saveFeeds();
            renderFeeds();
        }
    }

    function clearAll() {
        if(confirm("Delete all feeds?")) {
            feeds = [];
            saveFeeds();
            renderFeeds();
        }
    }

    function saveFeeds() {
        localStorage.setItem('myFeeds', JSON.stringify(feeds));
    }

    function renderFeeds() {
        container.innerHTML = '';

        if (feeds.length === 0) {
            container.innerHTML = '<div class="loading">No feeds added yet.</div>';
            return;
        }

        let allItems = [];
        feeds.forEach(feed => {
            feed.items.forEach(item => {
                allItems.push({
                    ...item,
                    sourceTitle: feed.title,
                    feedId: feed.id
                });
            });
        });

        allItems.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

        if (allItems.length === 0) {
            container.innerHTML = '<div class="loading">No articles found.</div>';
            return;
        }

        allItems.forEach(item => {
            const date = new Date(item.pubDate).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });

            let img = item.thumbnail || item.enclosure?.link || extractImage(item.content);
            if(!img) img = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjY2NjIiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHg9IjMiIHk9IjMiIHdpZHRoPSIxOCIgaGVpZ2h0PSIxOCIgcng9IjIiIHJ5PSIyIi8+PGNpcmNsZSBjeD0iOC41IiBjeT0iOC41IiByPSIxLjUiLz48cG9seWxpbmUgcG9pbnRzPSIyMSAxNSAxNiAxMCA1IDIxIi8+PC9zdmc+';

            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => window.open(item.link, '_blank');
            card.innerHTML = `
                    <button class="delete-feed" onclick="event.stopPropagation(); deleteFeed(${item.feedId})">×</button>
                    <img src="${img}" class="card-img" loading="lazy" onerror="this.style.display='none'">
                    <div class="card-content">
                        <div class="card-source">${item.sourceTitle}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-meta">${date}</div>
                    </div>
                `;
            container.appendChild(card);
        });
    }

    function extractImage(content) {
        const div = document.createElement('div');
        div.innerHTML = content;
        const img = div.querySelector('img');
        return img ? img.src : null;
    }
</script>
</body>
</html>
